server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: account-service
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/api/accounts/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  
  instance:
    hostname: localhost
    prefer-ip-address: true