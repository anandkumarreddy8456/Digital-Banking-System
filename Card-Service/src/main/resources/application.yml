server:
  port: 8086

spring:
  application:
    name: card-service

  datasource:
    url: jdbc:mysql://localhost:3306/banking_auth_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    hostname: localhost
    prefer-ip-address: true