server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/banking_auth_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s